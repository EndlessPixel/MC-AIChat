# ============================================
# MC-AIChat 数据库配置文件
# 首次启动服务器后，此文件会生成在 plugins/MC-AIChat/db.yml
# 修改后使用 /ai reload 命令重新加载，无需重启服务器
# ============================================

# 【数据库文件路径】
# SQLite 数据库文件的存储位置
# 支持相对路径（相对于插件目录）或绝对路径
# 默认存储在插件目录下的 data 文件夹中
db_file: "data/mcaichat.db"

# 【自动保存间隔】
# 自动保存对话记录到数据库的时间间隔（秒）
#   0 = 关闭自动保存，仅在服务器关闭时保存
#   其他值 = 每隔 N 秒自动保存一次
# 建议设置为 30-60 秒，平衡性能和数据安全性
auto_save_interval: 30

# 【退出时保存】
# 服务器关闭时是否自动保存所有对话记录
#   true = 服务器关闭时保存
#   false = 不保存（不推荐）
save_on_quit: true

# 【最大历史记录数】
# 每个上下文保留的最大消息数（包含用户和AI消息）
#   0 = 不限制
#   其他值 = 超过限制时自动删除最旧的消息
# 注意：此设置独立于 config.yml 中的 max_context
max_history_per_context: 100

# ============================================
# 修改配置后请使用 /ai reload 命令重新加载！
# ============================================
